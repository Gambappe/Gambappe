# TEMPORARY — regenerates WS21-T2's visual baselines (new save-ask-card, changed claim-prompt-banner)
# in the CI browser, commits them [skip ci], then removed before merge.
name: update-baselines
on:
  push:
    branches: [feat/ws21-t2-save-chip]
permissions:
  contents: write
jobs:
  regen:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: receipts, POSTGRES_PASSWORD: receipts, POSTGRES_DB: receipts }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U receipts -d receipts" --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://receipts:receipts@localhost:5432/receipts
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GHOST_COOKIE_SECRET: e2e-test-ghost-cookie-secret
      SHARE_TOKEN_SECRET: e2e-test-share-token-secret
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm db:migrate && pnpm db:seed
        env: { ADMIN_SEED_EMAIL: ci-admin@receipts.test }
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web exec playwright test e2e/dev-ui-visual.spec.ts -g "SaveAskCard|ClaimPromptEngine banner" --update-snapshots
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps/web/e2e/dev-ui-visual.spec.ts-snapshots)" ]; then
            git add apps/web/e2e/dev-ui-visual.spec.ts-snapshots
            git commit -m "chore(ws21-t2): regenerate save-ask + claim-prompt-banner baselines [skip ci]"
            git push origin HEAD:feat/ws21-t2-save-chip
          else echo "no baseline change"; fi
