# TEMPORARY — generates WS24-T1's new visual baselines (flaptext + departures-board) in the CI
# browser (no browser locally), commits them [skip ci], then is removed before merge.
name: update-baselines

on:
  push:
    branches: [feat/ws24-t1-departures]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: receipts
          POSTGRES_PASSWORD: receipts
          POSTGRES_DB: receipts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receipts -d receipts"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://receipts:receipts@localhost:5432/receipts
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GHOST_COOKIE_SECRET: e2e-test-ghost-cookie-secret
      SHARE_TOKEN_SECRET: e2e-test-share-token-secret
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build
      - name: Migrate + seed
        run: |
          pnpm db:migrate
          pnpm db:seed
        env:
          ADMIN_SEED_EMAIL: ci-admin@receipts.test
      - name: Install Playwright chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Regenerate departures baselines
        run: pnpm --filter web exec playwright test e2e/dev-ui-visual.spec.ts -g "WS24-T1" --update-snapshots
      - name: Commit regenerated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps/web/e2e/dev-ui-visual.spec.ts-snapshots)" ]; then
            git add apps/web/e2e/dev-ui-visual.spec.ts-snapshots
            git commit -m "chore(ws24-t1): add departures visual baselines [skip ci]"
            git push origin HEAD:feat/ws24-t1-departures
          else
            echo "No baseline change produced."
          fi
