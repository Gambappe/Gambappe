# TEMPORARY — regenerates the claim-prompt-banner visual baseline for the repositioned banner
# (now offset above the fixed tab bar), then removed before merge. Delete once the baseline lands.
name: update-baselines

on:
  push:
    branches: [fix/main-ci-green]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: receipts
          POSTGRES_PASSWORD: receipts
          POSTGRES_DB: receipts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receipts -d receipts"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://receipts:receipts@localhost:5432/receipts
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GHOST_COOKIE_SECRET: e2e-test-ghost-cookie-secret
      SHARE_TOKEN_SECRET: e2e-test-share-token-secret
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Migrate + seed
        run: |
          pnpm db:migrate
          pnpm db:seed
        env:
          ADMIN_SEED_EMAIL: ci-admin@receipts.test

      - name: Install Playwright chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Regenerate claim-prompt-banner baseline
        run: pnpm --filter web exec playwright test e2e/dev-ui-visual.spec.ts -g "ClaimPromptEngine banner" --update-snapshots

      - name: Commit regenerated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps/web/e2e/dev-ui-visual.spec.ts-snapshots)" ]; then
            git add apps/web/e2e/dev-ui-visual.spec.ts-snapshots
            git commit -m "chore(fix): regenerate claim-prompt-banner baseline (repositioned above tab bar) [skip ci]"
            git push origin HEAD:fix/main-ci-green
          else
            echo "No baseline change produced."
          fi
